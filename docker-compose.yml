services:
  backend:
    build:
      context: ./backend_standart_ai
      dockerfile: Dockerfile
    container_name: standart_tahlil_backend
    restart: unless-stopped
    env_file:
      - ./backend_standart_ai/.env
    volumes:
      - backend_uploads:/tmp/standart_tahlil
      - backend_data:/data
    networks:
      - standart_net

  nginx:
    image: nginx:1.25-alpine
    container_name: standart_tahlil_nginx
    restart: unless-stopped
    ports:
      - "4402:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - standart_net

volumes:
  backend_uploads:
  backend_data:

networks:
  standart_net:
    driver: bridge
