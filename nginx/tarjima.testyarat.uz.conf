# /etc/nginx/sites-available/tarjima.testyarat.uz
# Symlink: ln -s /etc/nginx/sites-available/tarjima.testyarat.uz /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tarjima.testyarat.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tarjima.testyarat.uz;

    ssl_certificate     /etc/letsencrypt/live/tarjima.testyarat.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarjima.testyarat.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 210M;

    location / {
        proxy_pass         http://127.0.0.1:4402;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
    }
}
